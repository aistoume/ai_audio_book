# AIBook 配置文件 —— 纯朗读模式（整本书生成单个音频文件）

# ============================================================
# TTS 配置
# ============================================================
tts:
  # 可选引擎：
  #   indextts    - B站开源，接近真人，适合有声书（推荐）
  #   gpt_sovits  - 零样本声音克隆，克隆特定人声最准
  #   cosyvoice   - 阿里开源，通用 TTS
  #   edge_tts    - 微软在线，兜底用
  engine: "indextts"

  # ---- IndexTTS（B站开源，书籍朗读效果接近真人）----
  indextts:
    api_url: "http://127.0.0.1:8000"
    token: "test_token"
    voice: "example1"          # 参考音色名称（对应 IndexTTS characters/example1.wav）
    response_format: "wav"     # wav | mp3 | ogg
    sample_rate: 24000
    speed: 1.0                 # 1.0=正常，0.9=慢10%，1.1=快10%
    gain: 0.0                  # 音量增益（dB）
    # 单段生成超时（秒）
    # - GPU(4090): 每段约 5-10 秒，timeout 300 足够
    # - CPU 模式: 每段可能 1-3 分钟，建议 timeout 1800
    timeout: 300

  # ---- GPT-SoVITS v2（零样本声音克隆，参考音频必须是 3-10 秒）----
  gpt_sovits:
    api_url: "http://127.0.0.1:9880"   # 默认端口
    # 参考音色（在 voice_samples/ 递归搜索，⚠️ GPT-SoVITS 严格要求 3-10 秒，否则会报错）
    voice: "example1_short"             # 对应 voice_samples/**/example1_short.wav

    # ⚠️ GPT-SoVITS 关键参数：prompt_text 必须是参考音频对应的"实际说话内容"
    # 否则克隆质量会明显下降
    prompt_text: "史记说刘邦相貌奇特，隆准而龙颜，这当然原本是要证明刘邦是真龙。"         # 请改成参考音频的真实文字
    prompt_lang: "zh"                   # zh / en / ja / ko / yue
    text_lang: "zh"                     # 要合成的文本语言

    # 生成控制
    speed_factor: 1.0                   # 语速
    media_type: "wav"                   # wav / ogg / aac / raw
    text_split_method: "cut5"           # 文本切分方式 cut0~cut5
    timeout: 600                        # CPU 模式建议 1800

    # 采样参数（一般不用改）
    top_k: 15
    top_p: 1.0
    temperature: 1.0
    repetition_penalty: 1.35
    batch_size: 1
    parallel_infer: true

  # ---- CosyVoice2 ----
  cosyvoice:
    api_url: "http://127.0.0.1:50000"
    mode: "sft"                # sft | zero_shot | instruct
    speaker: "中文男"           # 中文女 / 中文男 / 粤语女 / 英文女 / 英文男 / 日语男 / 韩语女
    speed: 0.9
    sample_rate: 22050
    instruct_text: ""

  # ---- edge-tts（在线备用）----
  edge_tts:
    voice: "zh-CN-YunjianNeural"
    rate: "-15%"
    pitch: "+0Hz"
    volume: "+0%"

# ============================================================
# 音频输出配置
# ============================================================
audio:
  output_format: "mp3"   # 最终合并后的文件格式: mp3 | wav
  gap_ms: 300            # 片段之间的静默时长（毫秒），让听感更自然

# ============================================================
# 文本处理配置
# ============================================================
processing:
  max_chars_per_segment: 300   # 每段最大字符数（TTS 单次调用的输入长度）
  min_chars_per_segment: 50    # 过短片段合并阈值
  books_dir: "books"
  output_dir: "output"
  voice_samples_dir: "voice_samples"  # 参考音色素材库（相对项目根目录）
